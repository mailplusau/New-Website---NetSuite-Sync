<script>

    var mainURLSplit = window.location.href.split('?');
    console.log(mainURLSplit)
    console.log(mainURLSplit.length);

    var urlParams = mainURLSplit[1].split('&');
    console.log(urlParams)
    var custInternalId = urlParams[0].split('=')
    var custName = urlParams[1].split('=')
    var custEmail = urlParams[2].split('=')
    var custPhone = urlParams[3].split('=')
    var firstName = urlParams[4].split('=')
    var lastName = urlParams[5].split('=')
    var contactid = urlParams[6].split('=')
    var state = urlParams[7].split('=')


    document.getElementById('customer_internal_id').value = custInternalId[1].toString();
    document.getElementById('company_name_signup').value = decodeURIComponent(custName[1]);
    document.getElementById('first_name_signup').value = firstName[1];
    document.getElementById('last_name_signup').value = lastName[1];
    document.getElementById('email_signup').value = custEmail[1];
    document.getElementById('phone_number_signup').value = custPhone[1];
    document.getElementById('contactid').value = contactid[1];
    document.getElementById('state').value = state[1];

</script>
