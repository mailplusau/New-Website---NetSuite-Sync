<h2 class="display-12 text-center text-md-center main-text-form"
    style="text-align: center; margin-bottom: 20px !important; line-height: 42px !important;">Operations Support</h2>
<h4 class="mb-6 text-center text-25px color--primary-2 sub-text-form"
    style="text-align: center; line-height: 27px !important;">Please fill in the details on this form, and our support
    team will get back to you ASAP via phone or email.</h4>
<div class="row">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;"><!-- FRANCHISEE -->
        <div style="text-align: center;"></div>
        <div class="form-label-group"><label class="input-field-label" style="display: none;">Franchisee*</label>
            <input id="zee_name" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="Franchisee*" />
        </div>
    </div>
</div>
<div class="row contact_details_row ">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;"><!-- COMPANY NAME -->
        <div style="text-align: center;"></div>
        <div class="form-label-group"><label class="input-field-label" style="display: none;">Operator Name</label>
            <input id="first_name" class="form-control form-control-flush input-field-alignment input-field-default" type="text" value="Operator Name" />
        </div>
    </div>
</div>
<div class="row contact_details_row ">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;"><!-- EMAIL ADDRESS-->
        <div class="form-label-group"><!-- <label class="input-field-label">Email Address*</label> -->
            <input id="email" class="form-control form-control-flush input-field-alignment input-field-default" type="text" value="Email Address" />
        </div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;"><!-- PHONE NUMBER -->
        <div class="form-label-group"><!-- <label class="input-field-label">Phone Number*</label> -->
            <input id="phone_number" class="form-control form-control-flush input-field-alignment input-field-default" type="text" value="Phone Number" />
        </div>
    </div>
</div>
<div class="row issues_row ">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;"><!-- TRACKING NUMBER -->
        <div style="text-align: center;"></div>
        <div class="form-label-group"><!-- <label class="input-field-label">Average Daily Shipments*</label> -->
            <select id="issues" class="form-control form-control-flush dropdown-field-alignment input-field-default"
                required="">
                <option selected="selected" value="0">Please select an issue*</option>
                <option value="13">Vehicle Breakdown</option>
                <option value="14">Insufficient Vehicle Capacity</option>
                <option value="16">Hub Capacity/Storage Issues</option>
                <option value="18">Technical/APP Error</option>
                <option value="19">Staffing/Driver Shortage</option>
                <option value="12">Tracking/Scanning Issues</option>
                <option value="9">Parcel/Item Damaged in Transit</option>
                <option value="9">Parcel/Item Damaged in Transit</option>
                <option value="7">Other</option>
            </select>
        </div>
    </div>
</div>
<div class="row comments_row ">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;"><!-- EMAIL ADDRESS-->
        <div class="form-label-group"><!-- <label class="input-field-label">Email Address*</label> -->
            <input id="comments" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="Brief Description*" />
        </div>
    </div>
</div>
<h4 style="text-align: center;"><!-- Submit -->
    <button class="btn btn-block-form btn-primary mt-3 lift get-in-touch-button create-operation-ticket-button-submit"
        style="margin-top: 0.75rem !important; width: 100%;">Submit
    </button>
</h4>
