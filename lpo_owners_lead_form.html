<h2 class="display-12 text-center text-md-center main-text-form"
    style="text-align: center; margin-bottom: 20px !important; line-height: 42px !important;">Enquire now to learn more
    and express your interest</h2>
<h4 class="mb-6 text-center text-25px color--primary-2 sub-text-form"
    style="text-align: center; line-height: 27px !important;">Be part of this growing collaboration and reinforce your
    LPO’s position as a leader in the parcel sector.</h4>
<div class="row">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;"><!-- LPO LOCATION/NAME -->
        <div style="text-align: center;"></div>
        <div class="form-label-group"><label class="input-field-label">LPO Location/Name<span
                    style="color: red;">*</span></label>
            <input id="lpo_name" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;"><!-- LPO OWNER NAME -->
        <div class="form-label-group"><label class="input-field-label">LPO Owner Name<span
                    style="color: red;">*</span></label>
            <input id="lpo_owner_name" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
</div>
<div class="row">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;"><!-- EMAIL ADDRESS-->
        <div class="form-label-group"><label class="input-field-label">Contact Email<span
                    style="color: red;">*</span></label>
            <input id="lpo_email" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;"><!-- PHONE NUMBER -->
        <div class="form-label-group"><label class="input-field-label">Contact Phone<span
                    style="color: red;">*</span></label>
            <input id="lpo_phone" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
</div>
<div class="row">
    <div class="col-12 col-md-3" style="padding-right: 0px !important;"><!-- ADDRESS 2 -->
        <div class="form-label-group"><label class="input-field-label">Street No. &amp; Name<span
                    style="color: red;">*</span></label>
            <input id="del_address2" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-2" style="padding-right: 0px !important;"><!-- ADDRESS 1 -->
        <div class="form-label-group"><label class="input-field-label">Unit Number/Level</label>
            <input id="del_add1" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-3" style="padding-right: 0px !important;"><!-- SUBURB -->
        <div class="form-label-group"><label class="input-field-label">Suburb</label>
            <input id="del_city" class="form-control form-control-flush input-field-alignment input-field-default"
                disabled="disabled" required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-2" style="padding-right: 0px !important;"><!-- STATE -->
        <div class="form-label-group"><label class="input-field-label">State</label>
            <input id="del_state" class="form-control form-control-flush input-field-alignment input-field-default"
                disabled="disabled" required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-2" style="padding-right: 0px !important;"><!-- POSTCODE -->
        <div class="form-label-group"><label class="input-field-label">Postcode</label>
            <input id="del_postcode" class="form-control form-control-flush input-field-alignment input-field-default"
                disabled="disabled" required="" type="text" value="" />
        </div>
    </div>
</div>
<div class="row">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <div class="form-label-group"><input id="del_lat"
                class="form-control form-control-flush input-field-alignment input-field-default hide"
                disabled="disabled" type="text" /></div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <div class="form-label-group"><input id="del_lng"
                class="form-control form-control-flush input-field-alignment input-field-default hide"
                disabled="disabled" type="text" /></div>
    </div>
</div>
<div class="row">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;"><!-- EMAIL ADDRESS-->
        <div class="form-label-group"><label class="input-field-label">Notes</label>
            <textarea id="lpo_notes"
                class="form-control form-control-flush input-field-alignment input-field-default"></textarea>

        </div>
    </div>
</div>
<h4 style="text-align: center; margin-top: 10px;"><button
        class="btn btn-block-form btn-primary mt-3 lift get-in-touch-button lpo-owner-submit "
        style="margin-top: 0.75rem !important; width: 100%;">Submit Now
    </button></h4>
