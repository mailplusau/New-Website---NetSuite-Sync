<h2 class="display-12 text-center text-md-center main-text-form"
    style="text-align: center; margin-bottom: 20px !important; line-height: 42px !important;">Go on, <em><u class=""
            style="text-decoration: underline; text-decoration-color: #FBEA51;">give us a go.</u></em></h2>
<h4 class="mb-6 text-center text-25px color--primary-2 sub-text-form"
    style="text-align: center; line-height: 27px !important;">Simply fill out this form and we’ll be in contact as soon
    as possible.</h4>
<h4 class="mb-6 text-center text-25px color--primary-2 sub-text-form"
    style="text-align: center; line-height: 27px !important;"></h4>
<div class="row company_name_row">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;">

        <!-- COMPANY NAME -->
        <div style="text-align: center;"></div>
        <div class="form-label-group"><label class="input-field-label">Company Name<span
                    style="color: red;">*</span></label>
            <input id="company_name" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
</div>
<div class="row name_row">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <div class="form-label-group"><label class="input-field-label">First Name<span
                    style="color: red;">*</span></label>
            <input id="first_name" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <!-- FULL NAME -->
        <div class="form-label-group">
            <div class="form-label-group"><label class="input-field-label">Last Name<span
                        style="color: red;">*</span></label>
                <input id="last_name" class="form-control form-control-flush input-field-alignment input-field-default"
                    required="" type="text" value="" />
            </div>
        </div>
    </div>
</div>
<div class="row contact_details_row">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <!-- EMAIL ADDRESS-->
        <div class="form-label-group">
            <div class="form-label-group"><label class="input-field-label">Email<span
                        style="color: red;">*</span></label>
                <input id="email" class="form-control form-control-flush input-field-alignment input-field-default"
                    required="" type="text" value="" />
            </div>
        </div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <!-- PHONE NUMBER -->
        <div class="form-label-group">
            <div class="form-label-group"><label class="input-field-label">Phone Number<span
                        style="color: red;">*</span></label>
                <input id="phone_number"
                    class="form-control form-control-flush input-field-alignment input-field-default" required=""
                    type="text" value="" />
            </div>
            <div></div>
        </div>
    </div>
</div>
<div style="text-align: center;"></div>
<div class="row delivery_details_row2 ">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;">
        <div class="form-label-group">
            <div></div>
            <div class="form-label-group"><label class="input-field-label">Average Daily Shipments<span
                        style="color: red;">*
                    </span></label><select id="avg_daily_shipments"
                    class="form-control form-control-flush dropdown-field-alignment input-field-default" required="">
                    <option selected="selected" value="0">Average Daily Shipments</option>
                    <option value="1">1-20 per Week</option>
                    <option value="2">21-100 per Week</option>
                    <option value="3">100+ per Week</option>
                </select></div>
        </div>
    </div>
</div>
<div class="row delivery_name_row ">
    <div class="col-12 col-md-12" style="padding-right: 0px !important;">
        <h4><span style="background-color: #095c7b; border-radius: 15px; height: auto; right: 0; position: relative;"
                class="label label-default col-xs-12 delivery_label">PICKUP INFORMATION.</span></h4>
    </div>
</div>
<div class="row delivery_details_row1 " style="padding-top: 10px;">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <div class="form-label-group"><label class="input-field-label">Unit Number/Level</label>
            <input id="del_add1" class="form-control form-control-flush input-field-alignment input-field-default"
                required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <div class="form-label-group"><label class="input-field-label">Street Address<span
                    style="color: red;">*</span></label>
            <input id="del_address2"
                class="form-control form-control-flush input-field-alignment input-field-default del_address2"
                required="" type="text" value="" />
        </div>
    </div>
</div>
<div class="row delivery_details_row2 ">
    <div class="col-12 col-md-4" style="padding-right: 0px !important;">
        <div class="form-label-group"><label class="input-field-label">City<span style="color: red;">*</span></label>
            <input id="del_city" class="form-control form-control-flush input-field-alignment input-field-default"
                disabled required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-4" style="padding-right: 0px !important;">
        <div class="form-label-group"><label class="input-field-label">State<span style="color: red;">*</span></label>
            <input id="del_state" class="form-control form-control-flush input-field-alignment input-field-default"
                disabled required="" type="text" value="" />
        </div>
    </div>
    <div class="col-12 col-md-4" style="padding-right: 0px !important;">
        <div class="form-label-group"><label class="input-field-label">Postcode<span
                    style="color: red;">*</span></label>
            <input id="del_postcode" class="form-control form-control-flush input-field-alignment input-field-default"
                disabled required="" type="text" value="" />
        </div>
    </div>
</div>

<div class="row delivery_details_row2 " style="">
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <div class="form-label-group">
            <input id="del_lat" class="form-control form-control-flush input-field-alignment input-field-default hide"
                disabled type="text" />
        </div>
    </div>
    <div class="col-12 col-md-6" style="padding-right: 0px !important;">
        <div class="form-label-group">
            <input id="del_lng" class="form-control form-control-flush input-field-alignment input-field-default hide"
                disabled type="text" />
        </div>
    </div>
</div>
<h4 style="text-align: center;">
    <!-- Submit -->
    <button class="btn btn-block-form btn-primary mt-3 lift get-in-touch-button create-auto-lead-button-submit "
        style="margin-top: 0.75rem !important; width: 100%;">Submit
    </button>
</h4>
